<!DOCTYPE html>
<html>
<head>
<title>Patient Registration</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef4ff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:700px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#1e40af;
}

.header p{
    color:gray;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input, select{
    width:100%;
    padding:14px;
    border:2px solid #dbeafe;
    border-radius:12px;
    font-size:15px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#1d4ed8;
}

</style>
</head>

<body>

<div class="card">

<div class="header">
<h1>🩸 Patient Registration</h1>
<p>Blood Test Management System</p>
</div>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label>👤 Username</label>
{{ form.username }}
</div>

<div class="form-group">
<label>🔒 Password</label>
{{ form.password }}
</div>

<div class="form-group">
<label>👤 Patient Name</label>
{{ form.name }}
</div>

<div class="form-group">
<label>📧 Email</label>
{{ form.email }}
</div>

<div class="form-group">
<label>🎂 Age</label>
{{ form.age }}
</div>

<div class="form-group">
<label>⚧ Gender</label>
{{ form.gender }}
</div>

<div class="form-group">
<label>📱 Contact</label>
{{ form.contact }}
</div>

<button class="btn" type="submit">
Register Patient
</button>

</form>

</div>

</body>
</html>
