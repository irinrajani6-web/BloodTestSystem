<!DOCTYPE html>
<html>
<head>
    <title>Upload Blood Test Report</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#eef4ff;
        }

        .navbar{
            background:#2563eb;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .container{
            width:550px;
            margin:50px auto;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            color:#2563eb;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:gray;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:18px;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        textarea{
            resize:vertical;
            height:120px;
        }

        input:focus,
        select:focus,
        textarea:focus{
            outline:none;
            border-color:#2563eb;
        }

        .btn{
            width:100%;
            margin-top:25px;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .back{
            display:inline-block;
            margin-bottom:20px;
            text-decoration:none;
            color:white;
            background:#2563eb;
            padding:10px 18px;
            border-radius:8px;
        }

    </style>

</head>

<body>

<div class="navbar">
🩸 Blood Test Management System
</div>

<div class="container">

<a href="/admin-dashboard/" class="back">← Dashboard</a>

<h2>Upload Blood Test Report</h2>

<p>Upload reports for registered patients.</p>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<label>Patient</label>
{{ form.patient }}

<label>Report Title</label>
{{ form.title }}

<label>Description</label>
{{ form.description }}

<label>Upload Report (PDF/Image)</label>
{{ form.file }}

<button type="submit" class="btn">
🩸 Generate Report
</button>

</form>

</div>

</body>
</html>
