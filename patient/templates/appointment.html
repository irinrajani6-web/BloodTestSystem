<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#eef4ff;
}

.container{
width:600px;
margin:50px auto;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:10px;
}

p{
text-align:center;
color:gray;
margin-bottom:25px;
}

label{
display:block;
font-weight:bold;
margin-bottom:8px;
margin-top:15px;
}

input,
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

button{
margin-top:25px;
width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#2563eb;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<a href="/patient-dashboard/" class="back">
← Back to Dashboard
</a>

<h1>📅 Book Appointment</h1>

<p>Select your preferred date and time.</p>

<form method="POST">

{% csrf_token %}

<label>Appointment Date</label>
{{ form.date }}

<label>Appointment Time</label>
{{ form.time }}

<label>Reason</label>
{{ form.reason }}

<button type="submit">
Book Appointment
</button>

</form>

</div>

</body>
</html>
